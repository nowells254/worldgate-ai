let lang='en', curType=0, curContinent='Africa', searchCount=0;

function applyLang(l){
  lang=l;
  const t=T[l];
  document.getElementById('hTitle').textContent=t.hTitle;
  document.getElementById('hSub').textContent=t.hSub;
  document.getElementById('searchInput').placeholder=t.searchPH;
  document.getElementById('exploreBtn').textContent=t.exploreBtn;
  document.getElementById('s1').textContent=t.s1;
  document.getElementById('s2').textContent=t.s2;
  document.getElementById('s3').textContent=t.s3;
  document.getElementById('s4').textContent=t.s4;
  document.getElementById('secCont').textContent=t.secCont;
  document.getElementById('freeBadge').textContent=t.free;
  document.getElementById('pwTitle').textContent=t.pwTitle;
  document.getElementById('pwSub').textContent=t.pwSub;
  document.getElementById('pwPer1').textContent=t.pwPer1;
  document.getElementById('pwLbl1').textContent=t.pwLbl1;
  document.getElementById('pwPer2').textContent=t.pwPer2;
  document.getElementById('pwLbl2').textContent=t.pwLbl2;
  document.getElementById('pwPer3').textContent=t.pwPer3;
  document.getElementById('pwLbl3').textContent=t.pwLbl3;
  document.getElementById('payBtn').textContent=t.payBtn;
  document.getElementById('aiBriefLabel').textContent=t.aiBriefLabel;
  document.getElementById('aiLiveLabel').textContent=t.aiLiveLabel;
  document.getElementById('shareBtn').textContent=t.shareBtn;
  renderTypeButtons();
  renderContinents();
  renderOpps(curContinent);
  const idx=['Africa','Asia','Europe','Americas','Middle East','Oceania'].indexOf(curContinent);
  document.getElementById('oppTitle').textContent=t.oppIn+' '+(t.continents[idx]||curContinent);
}

function renderTypeButtons(){
  const t=T[lang];
  document.getElementById('typeGrid').innerHTML=t.types.map((tp,i)=>
    `<button class="type-btn${i===curType?' active':''}" onclick="setType(${i})">${tp}</button>`
  ).join('');
}

function setType(i){curType=i;renderTypeButtons();}

function renderContinents(){
  const t=T[lang];
  const keys=['Africa','Asia','Europe','Americas','Middle East','Oceania'];
  const icons=['🌍','🌏','🌍','🌎','🕌','🌊'];
  document.getElementById('contGrid').innerHTML=keys.map((k,i)=>
    `<div class="cont-card${k===curContinent?' active':''}" onclick="selCont('${k}',${i})">
      <div class="cont-icon">${icons[i]}</div>
      <div class="cont-name">${t.continents[i]}</div>
      <div class="cont-count">${t.contCounts[i]}</div>
    </div>`
  ).join('');
}

function selCont(k,i){
  curContinent=k;
  const t=T[lang];
  document.getElementById('oppTitle').textContent=t.oppIn+' '+t.continents[i];
  document.getElementById('paywall').style.display='none';
  document.getElementById('aiBox').style.display='none';
  renderContinents();
  renderOpps(k);
}

function renderOpps(continent){
  const t=T[lang];
  const opps=oppData[continent]||oppData['Africa'];
  document.getElementById('oppGrid').innerHTML=opps.map((o,i)=>
    `<div class="opp-card" onclick="viewOpp(${i},'${continent}')">
      <div class="opp-top"><span class="opp-tag ${o.cls}">${t[o.tagKey]}</span><span class="opp-score">⭐ ${o.score}/10</span></div>
      <div class="opp-title">${o.titleKey}</div>
      <div class="opp-desc">${o.descKey}</div>
      <div class="opp-foot"><span class="opp-ctry">${o.ctry}</span><button class="opp-btn">${t.fullReport}</button></div>
    </div>`
  ).join('');
}

async function viewOpp(i,continent){
  searchCount++;
  if(searchCount>3){
    document.getElementById('paywall').style.display='block';
    document.getElementById('paywall').scrollIntoView({behavior:'smooth'});
    return;
  }
  const t=T[lang];
  const o=oppData[continent][i];
  const typeName=t.types[curType];
  const box=document.getElementById('aiBox');
  box.style.display='block';
  document.getElementById('aiBriefLabel').textContent=o.titleKey+' — '+t.aiBriefLabel;
  document.getElementById('aiBody').innerHTML='<p style="color:#8e8e93">⏳ Generating AI briefing...</p>';
  box.scrollIntoView({behavior:'smooth'});
  try {
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:`You are WorldGate AI, a global opportunity intelligence platform. A ${typeName} is asking about: ${o.titleKey} in ${o.ctry}. Generate a concise, professional opportunity briefing in ${lang==='en'?'English':lang==='zh'?'Chinese':lang==='fr'?'French':lang==='es'?'Spanish':lang==='ar'?'Arabic':lang==='sw'?'Swahili':lang==='pt'?'Portuguese':lang==='hi'?'Hindi':lang==='ja'?'Japanese':lang==='ko'?'Korean':lang==='de'?'German':'Russian'} covering: 1) Why this opportunity is ideal for a ${typeName}, 2) Key entry steps, 3) Expected returns or outcomes, 4) Risk level, 5) One insider tip from Africa. Keep it under 150 words. Be specific and actionable.`}]}]})
    });
    const data=await res.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'AI briefing generated successfully.';
    document.getElementById('aiBody').innerHTML=`<p style="line-height:1.8">${text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</p>`;
  } catch(e){
    const t2=T[lang];
    document.getElementById('aiBody').innerHTML=`
      <p style="margin-bottom:9px">${t2.aiIntro} <span class="hl">${o.titleKey}</span> ${t2.aiFor} <span class="hl">${typeName}</span>.</p>
      <p style="margin-bottom:9px"><strong>${t2.aiScore}:</strong> <span class="hl">${o.score}/10</span> — ${t2.aiHigh}.</p>
      <p style="margin-bottom:9px"><strong>${t2.aiWhy}:</strong> ${o.descKey}</p>
      <p style="margin-bottom:9px"><strong>${t2.aiSteps}:</strong> ${t2.aiStep}</p>
      <p><strong>${t2.aiRisk}:</strong> <span style="color:#1D9E75;font-weight:600">${t2.aiLow}</span> · <strong>${t2.aiTime}:</strong> 6–18 months · <strong>${t2.aiMin}:</strong> $5,000+</p>`;
  }
}

async function doSearch(){
  const q=document.getElementById('searchInput').value;
  if(!q)return;
  searchCount++;
  if(searchCount>3){document.getElementById('paywall').style.display='block';return;}
  const t=T[lang];
  const box=document.getElementById('aiBox');
  box.style.display='block';
  document.getElementById('aiBriefLabel').textContent=q+' — '+t.aiBriefLabel;
  document.getElementById('aiBody').innerHTML='<p style="color:#8e8e93">⏳ Searching WorldGate AI...</p>';
  box.scrollIntoView({behavior:'smooth'});
  try {
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:`You are WorldGate AI. A user searched for: "${q}". Generate a helpful global opportunity briefing about this topic in ${lang==='en'?'English':lang==='zh'?'Chinese':lang==='fr'?'French':lang==='es'?'Spanish':lang==='ar'?'Arabic':lang==='sw'?'Swahili':lang==='pt'?'Portuguese':lang==='hi'?'Hindi':lang==='ja'?'Japanese':lang==='ko'?'Korean':lang==='de'?'German':'Russian'}. Cover opportunities, risks, entry requirements, and expected outcomes. Under 150 words. Be specific.`}]}]})
    });
    const data=await res.json();
    const text=data.candidates?.[0]?.content?.parts?.[0]?.text||'Results found.';
    document.getElementById('aiBody').innerHTML=`<p style="line-height:1.8">${text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</p>`;
  } catch(e){
    document.getElementById('aiBody').innerHTML=`<p>${t.pwSub}</p>`;
  }
}

function doShare(){
  if(navigator.share){navigator.share({title:'WorldGate AI Opportunity',text:'Check out this global opportunity I found on WorldGate AI!',url:window.location.href});}
  else{navigator.clipboard.writeText(window.location.href);alert('Link copied! Share on WeChat or WhatsApp.');}
}

applyLang('en');
</script>
